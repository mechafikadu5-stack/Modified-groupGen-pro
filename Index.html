<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>maffy's GroupGen</title>
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        .highlight {
            background-color: #fef08a !important;
            border: 2px solid #eab308 !important;
            transform: scale(1.02);
            z-index: 10;
        }
        html, body {
            overscroll-behavior-y: contain;
            -webkit-overflow-scrolling: touch;
            height: 100%;
        }
        .group-card {
            transition: all 0.2s ease;
        }
        #toast {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .student-row {
            transition: background-color 0.3s ease, border 0.3s ease, transform 0.2s ease;
        }
    </style>
</head>
<body class="bg-slate-50 p-2 md:p-6 min-h-screen">
    <div id="app" class="max-w-7xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
        <!-- Header -->
        <header class="bg-blue-600 p-4 md:p-5 text-white flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-xl font-bold flex items-center gap-2">Maffy's GroupGen Pro</h1>
                <p id="stats" class="text-blue-100 text-xs font-semibold uppercase tracking-wider">Ready, Later</p>
            </div>
            <div class="flex flex-wrap gap-2">
                <button id="btnInstall" class="hidden bg-white text-blue-600 px-3 py-2 rounded-xl text-[11px] font-black shadow-lg animate-bounce">Install App</button>
                <button onclick="exportToExcel()" class="bg-emerald-500 hover:bg-emerald-600 px-3 py-2 rounded-xl text-[11px] font-bold shadow-md">Excel Export</button>
                <button onclick="exportToPDF()" class="bg-rose-500 hover:bg-rose-600 px-3 py-2 rounded-xl text-[11px] font-bold shadow-md">PDF Export</button>
                <button onclick="clearData()" class="bg-white/10 hover:bg-red-500 px-3 py-2 rounded-xl text-[11px] font-bold border border-white/20">Clear All</button>
            </div>
        </header>

        <!-- Controls Area -->
        <section class="p-4 md:p-5 bg-white border-b border-slate-100">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 items-end">
                <div class="lg:col-span-3">
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-1.5 block">1. File (Excel/CSV/PDF)</label>
                    <input type="file" id="fileInput" accept=".xlsx, .xls, .csv, .pdf" class="hidden">
                    <button onclick="document.getElementById('fileInput').click()" class="w-full bg-blue-50 border-2 border-dashed border-blue-200 text-blue-700 p-2.5 rounded-xl font-bold text-sm hover:bg-blue-100">
                        Upload File
                    </button>
                </div>
                <div class="lg:col-span-5">
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-1.5 block">2. Strategy</label>
                    <div class="flex flex-wrap sm:flex-nowrap gap-2">
                        <select id="calcMode" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-2 py-2 text-xs font-bold">
                            <option value="size" selected>Group Size</option>
                            <option value="count">Groups Count</option>
                        </select>
                        <input type="number" id="calcValue" value="5" class="w-14 bg-slate-50 border border-slate-200 rounded-xl text-center font-bold text-blue-600">
                        <select id="groupMode" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-2 py-2 text-xs font-bold">
                            <option value="balanced">Gender Balance</option>
                            <option value="random">Random</option>
                            <option value="alphabetical">Alphabetical (Names Only)</option>
                        </select>
                        <button onclick="generateGroups()" class="w-full sm:w-auto bg-blue-600 text-white px-5 py-2 rounded-xl text-xs font-black hover:bg-blue-700 active:scale-95 transition-all shadow-md">
                            GENERATE
                        </button>
                    </div>
                </div>
                <div class="lg:col-span-4">
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-1.5 block">3. Search</label>
                    <input type="text" id="searchInput" placeholder="Search names..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
        </section>

        <!-- Display Area -->
        <main id="resultsGrid" class="p-4 md:p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6 bg-slate-50 min-h-[60vh]">
            <div class="col-span-full text-center py-20 text-slate-400 font-medium italic">Ready for input, Later.</div>
        </main>
    </div>

    <!-- Message / Toast System -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-20 bg-slate-900 text-white text-sm font-bold px-8 py-4 rounded-2xl opacity-0 pointer-events-none z-50 shadow-2xl min-w-[280px] text-center"></div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        function showMessage(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.backgroundColor = isError ? '#ef4444' : '#0f172a';
            t.classList.remove('opacity-0', 'translate-y-20', 'pointer-events-none');
